name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Get diff
        run: |
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Run AI Review
        run: python ai_reviewer.py

      - name: Post Comment
        run: python post_comment.py