name: AI Maintainer Summary

on:
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  summarize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    concurrency:
      group: ai-maintainer-summary-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate and post AI summary
        id: generate_summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python .github/scripts/ai_maintainer.py

      - name: Add failure guidance
        if: failure() && steps.generate_summary.outcome == 'failure'
        run: |
          echo "## AI Maintainer Summary Failure" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Check the 'Generate and post AI summary' step logs." >> "$GITHUB_STEP_SUMMARY"
          echo "- Verify OPENAI_API_KEY is configured and valid." >> "$GITHUB_STEP_SUMMARY"
          echo "- Confirm the workflow still has permission to write issue/PR comments." >> "$GITHUB_STEP_SUMMARY"
